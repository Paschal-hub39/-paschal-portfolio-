<!DOCTYPE html>
<html>
<head>
<title>Paschala Admin Dashboard</title>
<style>
body{background:#0a0a0a;color:white;font-family:Arial;text-align:center;}
input{padding:10px;margin:5px;border-radius:6px;border:none;width:80%;}
button{padding:10px;margin:5px;border-radius:6px;background:#10B981;color:white;border:none;cursor:pointer;}
.card{background:#111;padding:15px;margin:15px;border-radius:10px;}
</style>
</head>
<body>

<h1>Paschala Admin Dashboard (Offline)</h1>

<div class="card">
<h3>Offline Order Log</h3>
<input id="newOrder" placeholder="Add new order">
<button onclick="addOrder()">Add</button>
<div id="orders"></div>
</div>

<script>
let orders=[];
function addOrder(){
let val=document.getElementById("newOrder").value;
if(val!=""){orders.push(val); display(); document.getElementById("newOrder").value="";}
}
function display(){
document.getElementById("orders").innerHTML=orders.join("<br>");
}
</script>

</body>
</html>
